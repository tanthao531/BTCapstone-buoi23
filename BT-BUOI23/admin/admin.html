  <div class="container py-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Danh sách sản phẩm</h1>

      <button
        class="btn btn-success"
        data-bs-toggle="modal"
        data-bs-target="#productModal"
        onclick="openAddModal()"
      >
        Thêm sản phẩm
      </button>
    </div>

    <!-- Search + Sort -->
    <div class="row mb-4">

      <div class="col-md-6">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Tìm kiếm theo tên sản phẩm..."
        />
      </div>

      <div class="col-md-3">
        <select
          id="sortPrice"
          class="form-select"
        >
          <option value="">Sắp xếp theo giá</option>
          <option value="asc">Giá tăng dần</option>
          <option value="desc">Giá giảm dần</option>
        </select>
      </div>

    </div>

    <!-- Table -->
    <table class="table table-bordered table-striped align-middle">

      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Image</th>
          <th>Name</th>
          <th>Price</th>
          <th>Screen</th>
          <th>Front Camera</th>
          <th>Back Camera</th>
          <th>Description</th>
          <th>Type</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="productList"></tbody>

    </table>

  </div>

  <!-- Modal -->
  <div
    class="modal fade"
    id="productModal"
    tabindex="-1"
  >
    <div class="modal-dialog modal-lg">
      <div class="modal-content">

        <div class="modal-header">
          <h5
            class="modal-title"
            id="modalTitle"
          >
            Thêm sản phẩm
          </h5>

          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
          ></button>
        </div>

        <div class="modal-body">

          <input type="hidden" id="productId"/>

          <div class="row">

            <div class="col-md-6 mb-3">
              <label>Name</label>
              <input type="text" id="name" class="form-control"/>
            </div>

            <div class="col-md-6 mb-3">
              <label>Price</label>
              <input type="number" id="price" class="form-control"/>
            </div>

            <div class="col-md-6 mb-3">
              <label>Image URL</label>
              <input type="text" id="img" class="form-control"/>
            </div>

            <div class="col-md-6 mb-3">
              <label>Screen</label>
              <input type="text" id="screen" class="form-control"/>
            </div>

            <div class="col-md-6 mb-3">
              <label>Front Camera</label>
              <input type="text" id="frontCamera" class="form-control"/>
            </div>

            <div class="col-md-6 mb-3">
              <label>Back Camera</label>
              <input type="text" id="backCamera" class="form-control"/>
            </div>

            <div class="col-md-6 mb-3">
              <label>Type</label>
              <input type="text" id="type" class="form-control"/>
            </div>

            <div class="col-12 mb-3">
              <label>Description</label>
              <textarea
                id="desc"
                class="form-control"
                rows="3"
              ></textarea>
            </div>

          </div>

        </div>

        <div class="modal-footer">

          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Đóng
          </button>

          <button
            type="button"
            class="btn btn-primary"
            id="btnSave"
          >
            Lưu sản phẩm
          </button>

        </div>

      </div>
    </div>
  </div>
